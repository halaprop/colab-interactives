<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Diagram Harness</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Loads apps/<name>/index.js as a module; its own import statements
         pull in everything else (lib files, D3 from an ESM CDN URL), same
         as the Colab shim, so "looks right locally" == "looks right in
         Colab". -->
    <script>
      const params = new URLSearchParams(location.search);
      const app = params.get('app') || 'diagram-editor';
      const entryPath = `apps/${app}/index.js`;

      // Default tab title is the app folder's last path component (e.g.
      // "idea0" for tictactoe/idea0); index.js can override by setting
      // document.title itself, since it runs after this.
      document.title = app.split('/').pop();

      const s = document.createElement('script');
      s.type = 'module';
      s.src = `/${entryPath}`;
      s.onerror = () => {
        document.getElementById('app').textContent = `error: ${entryPath} not found`;
      };
      document.body.appendChild(s);
    </script>
  </body>
</html>
