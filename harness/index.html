<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Diagram Harness</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- Reads apps/<name>/manifest.json and loads deps -> entry in order,
         same logic shim.py uses, so "looks right locally" == "looks right
         in Colab". -->
    <script>
      const params = new URLSearchParams(location.search);
      const app = params.get('app') || 'diagram-editor';

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }

      fetch(`/apps/${app}/manifest.json`)
        .then((r) => (r.ok ? r.json() : {}))
        .catch(() => ({}))
        .then(async (manifest) => {
          const deps = manifest.deps || [];
          const entry = manifest.entry || 'index.js';

          for (const dep of deps) {
            const src = dep.startsWith('http') ? dep : `/${dep}`;
            await loadScript(src);
          }

          const entryPath = `apps/${app}/${entry}`;
          loadScript(`/${entryPath}`).catch(() => {
            document.getElementById('app').textContent = `error: ${entryPath} not found`;
          });
        });
    </script>
  </body>
</html>
